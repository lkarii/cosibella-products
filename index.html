<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 16 16%22><text y=%2213%22 font-size=%2214%22>🛒</text></svg>"
    />
    <title>Cosibella Products — katalog produktów</title>
    <script>
      (function () {
        var stored = localStorage.getItem('cosibella-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (stored === 'dark' || (!stored && prefersDark)) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <style>
      #page-loader {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f7f7f9;
      }
      #page-loader.is-hidden {
        display: none;
      }
      #page-loader .page-loader__spinner {
        width: 2.5rem;
        height: 2.5rem;
        border: 3px solid #e0e0e6;
        border-top-color: #8a4f49;
        border-radius: 50%;
        animation: page-loader-spin 0.8s linear infinite;
      }
      @keyframes page-loader-spin {
        to {
          transform: rotate(360deg);
        }
      }
      html[data-theme='dark'] #page-loader {
        background: #16161b;
      }
      html[data-theme='dark'] #page-loader .page-loader__spinner {
        border-color: #35353f;
        border-top-color: #e3a89c;
      }
    </style>
  </head>
  <body>
    <div id="page-loader" class="page-loader" role="status" aria-live="polite">
      <span class="page-loader__spinner" aria-hidden="true"></span>
      <span style="position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap"
        >Wczytywanie strony…</span
      >
    </div>

    <div id="app">
      <header class="page-header">
        <img src="/src/img/logo_1_big.png" alt="Cosibella" class="page-header__logo" width="181" height="32" />
        <button type="button" id="theme-toggle-btn" class="theme-toggle" aria-label="Przełącz motyw"></button>
      </header>

      <main class="page-main">
        <div class="toolbar">
          <section id="filters" class="filters" aria-label="Filtry produktów"></section>

          <div class="view-toggle" role="group" aria-label="Widok produktów">
            <button type="button" id="view-gallery-btn" class="view-toggle__btn" aria-label="Galeria">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M9 13C9.53043 13 10.0391 13.2107 10.4142 13.5858C10.7893 13.9609 11 14.4696 11 15V19C11 19.5304 10.7893 20.0391 10.4142 20.4142C10.0391 20.7893 9.53043 21 9 21H5C4.46957 21 3.96086 20.7893 3.58579 20.4142C3.21071 20.0391 3 19.5304 3 19V15C3 14.4696 3.21071 13.9609 3.58579 13.5858C3.96086 13.2107 4.46957 13 5 13H9ZM19 13C19.5304 13 20.0391 13.2107 20.4142 13.5858C20.7893 13.9609 21 14.4696 21 15V19C21 19.5304 20.7893 20.0391 20.4142 20.4142C20.0391 20.7893 19.5304 21 19 21H15C14.4696 21 13.9609 20.7893 13.5858 20.4142C13.2107 20.0391 13 19.5304 13 19V15C13 14.4696 13.2107 13.9609 13.5858 13.5858C13.9609 13.2107 14.4696 13 15 13H19ZM9 3C9.53043 3 10.0391 3.21071 10.4142 3.58579C10.7893 3.96086 11 4.46957 11 5V9C11 9.53043 10.7893 10.0391 10.4142 10.4142C10.0391 10.7893 9.53043 11 9 11H5C4.46957 11 3.96086 10.7893 3.58579 10.4142C3.21071 10.0391 3 9.53043 3 9V5C3 4.46957 3.21071 3.96086 3.58579 3.58579C3.96086 3.21071 4.46957 3 5 3H9ZM19 3C19.5304 3 20.0391 3.21071 20.4142 3.58579C20.7893 3.96086 21 4.46957 21 5V9C21 9.53043 20.7893 10.0391 20.4142 10.4142C20.0391 10.7893 19.5304 11 19 11H15C14.4696 11 13.9609 10.7893 13.5858 10.4142C13.2107 10.0391 13 9.53043 13 9V5C13 4.46957 13.2107 3.96086 13.5858 3.58579C13.9609 3.21071 14.4696 3 15 3H19Z" fill="currentColor"/>
              </svg>
            </button>
            <button type="button" id="view-table-btn" class="view-toggle__btn" aria-label="Tabela">
              <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M2.5 12C2.5 11.8674 2.55268 11.7402 2.64645 11.6464C2.74021 11.5527 2.86739 11.5 3 11.5H13C13.1326 11.5 13.2598 11.5527 13.3536 11.6464C13.4473 11.7402 13.5 11.8674 13.5 12C13.5 12.1326 13.4473 12.2598 13.3536 12.3536C13.2598 12.4473 13.1326 12.5 13 12.5H3C2.86739 12.5 2.74021 12.4473 2.64645 12.3536C2.55268 12.2598 2.5 12.1326 2.5 12ZM2.5 8C2.5 7.86739 2.55268 7.74021 2.64645 7.64645C2.74021 7.55268 2.86739 7.5 3 7.5H13C13.1326 7.5 13.2598 7.55268 13.3536 7.64645C13.4473 7.74021 13.5 7.86739 13.5 8C13.5 8.13261 13.4473 8.25979 13.3536 8.35355C13.2598 8.44732 13.1326 8.5 13 8.5H3C2.86739 8.5 2.74021 8.44732 2.64645 8.35355C2.55268 8.25979 2.5 8.13261 2.5 8ZM2.5 4C2.5 3.86739 2.55268 3.74021 2.64645 3.64645C2.74021 3.55268 2.86739 3.5 3 3.5H13C13.1326 3.5 13.2598 3.55268 13.3536 3.64645C13.4473 3.74021 13.5 3.86739 13.5 4C13.5 4.13261 13.4473 4.25979 13.3536 4.35355C13.2598 4.44732 13.1326 4.5 13 4.5H3C2.86739 4.5 2.74021 4.44732 2.64645 4.35355C2.55268 4.25979 2.5 4.13261 2.5 4Z" fill="currentColor"/>
              </svg>
            </button>
          </div>
        </div>

        <p id="loading-indicator" class="status status--loading is-hidden" aria-live="polite">
          Wczytywanie produktów…
        </p>

        <div id="error-banner" class="status status--error is-hidden" role="alert">
          <p id="error-message" class="status__message"></p>
          <button type="button" id="error-retry-btn" class="status__retry-btn">Spróbuj ponownie</button>
        </div>

        <p id="empty-state" class="status status--empty is-hidden">
          Brak produktów spełniających wybrane kryteria filtrowania.
        </p>

        <div id="results-container" class="is-hidden">
          <div class="table-wrapper">
            <table id="product-table" class="product-table">
              <thead>
                <tr>
                  <th scope="col">ID</th>
                  <th scope="col">Nazwa</th>
                  <th scope="col">Kategoria</th>
                  <th scope="col">Cena</th>
                  <th scope="col" aria-label="Dostępność"></th>
                </tr>
              </thead>
              <tbody id="product-table-body"></tbody>
            </table>
          </div>

          <div id="product-gallery" class="product-gallery is-hidden"></div>
        </div>

        <nav id="pagination" class="pagination is-hidden" aria-label="Paginacja"></nav>
      </main>

      <dialog id="product-modal" class="product-modal">
        <form method="dialog" class="product-modal__close-form">
          <button type="submit" class="product-modal__close-btn" aria-label="Zamknij">&times;</button>
        </form>
        <div id="product-modal-content" class="product-modal__content"></div>
      </dialog>
    </div>

    <footer class="page-footer">
      <div class="page-footer__inner">
        <div class="page-footer__col">
          <p class="page-footer__heading">Cosibella recruitment test</p>
          <p>All rights reserved.</p>
        </div>
        <div class="page-footer__col">
          <p class="page-footer__heading">Contact:</p>
          <p><a href="mailto:karina.lukashov@gmail.com">karina.lukashov@gmail.com</a></p>
        </div>
      </div>
    </footer>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
